name: Update Doo-Nang Playlist

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install axios

      - name: Run scraper
        run: node doonung.js

      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/*.json wiseplay/*.json playlist_doonung.m3u

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "🔄 Auto update doo-nang"
          git push
